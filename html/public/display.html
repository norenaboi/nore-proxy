<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <title>Model List</title>
        <link rel="stylesheet" href="css/display.css" />
    </head>
    <body>
        <div class="container">
            <a href="/" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> Return to main menu
            </a>

            <header>
                <h1>Models</h1>
                <p class="subtitle">Select your model of choice</p>
            </header>

            <div class="main-layout">
                <div class="table-container" id="table-container">
                    <div class="loading">
                        <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                        <p style="margin-top: 15px">Loading models...</p>
                    </div>
                </div>

                <div class="filters-sidebar">
                    <div class="filters-title">Providers</div>
                    <div id="filters-list"></div>
                </div>
            </div>
        </div>

        <div id="notification" class="copy-notification">
            <i class="fa-solid fa-check"></i> Copied to Clipboard
        </div>

        <script src="js/display.js"></script>
    </body>
</html>
