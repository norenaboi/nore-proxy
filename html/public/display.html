<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <link rel="icon" href="favicon.ico">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <title>Models — Nore Proxy</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="css/public-editorial.css">
      <link rel="stylesheet" href="css/display.css">
   </head>
   <body>
      <header class="public-head">
         <a class="brand" href="/"><img class="brand-mark" src="/favicon.ico" alt=""><strong>Nore Proxy</strong></a>
         <nav aria-label="Public navigation"><a href="/usage">Usage</a><a href="/models" aria-current="page">Models</a><a href="/">Overview</a></nav>
      </header>
      <main class="public-main">
         <header class="catalog-head">
            <div>
               <p class="eyebrow">Model catalog</p>
               <h1>Available models</h1>
               <p class="lead">Search the catalog, filter by provider, and click any card to copy its exact identifier.</p>
            </div>
            <a class="back-link" href="/">← Overview</a>
         </header>
         <div class="toolbar">
            <div class="search-wrap" id="search-wrap">
               <i class="fa-solid fa-magnifying-glass search-icon"></i>
               <input class="search-input" id="model-search" type="search" placeholder="Search models… ( / )" autocomplete="off" aria-label="Search models">
               <button class="search-clear" id="search-clear" type="button">Clear</button>
            </div>
            <div class="chips" id="filters-list"></div>
         </div>
         <p class="result-meta" id="result-meta"></p>
         <div class="model-grid" id="model-grid">
            <div class="loading">
               <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
               <p>Loading models…</p>
            </div>
         </div>
      </main>
      <footer class="public-footer"><span>Nore Proxy</span><a href="/usage">Review usage</a></footer>
      <div id="notification" class="copy-notification"><i class="fa-solid fa-check"></i> Copied to clipboard</div>
      <script src="js/display.js"></script>
   </body>
</html>
