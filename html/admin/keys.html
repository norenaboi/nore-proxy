<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Admin Key Manager</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="shared.css" />
        <script src="theme.js"></script>
        <link rel="stylesheet" href="css/keys.css" />
        <link rel="stylesheet" href="css/admin-editorial.css" />
    </head>
    <body>
        <a class="skip-link" href="#main">Skip to content</a>
        <aside class="sidebar">
            <div class="logo">
                <img class="logo-icon" src="/favicon.ico" alt="">
                <span class="logo-text">Nore Proxy</span>
            </div>

            <nav class="nav-menu" aria-label="Admin navigation">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item" href="/admin/users">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item active" aria-current="page">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item" href="/admin/logs">
                    <i class="fa-solid fa-terminal"></i>
                    <span>Logs</span>
                </a>
                <a class="nav-item" href="/admin/errors">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Errors</span>
                </a>
                <a class="nav-item" href="/admin/settings">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <div id="message" class="message">
            <svg viewBox="0 0 24 24" class="success-icon">
                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
            </svg>
            <svg viewBox="0 0 24 24" class="error-icon" style="display: none">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"
                />
            </svg>
            <span id="messageText"></span>
        </div>

        <div class="modal-overlay" id="deleteModal">
            <div class="modal">
                <h3>Delete API Key</h3>
                <p id="deleteModalText">
                    Are you sure you want to delete this API key? This action
                    cannot be undone.
                </p>
                <div class="modal-actions">
                    <button class="btn btn-ghost" onclick="closeDeleteModal()">
                        Cancel
                    </button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">
                        Delete Key
                    </button>
                </div>
            </div>
        </div>

        <main class="main-content" id="main">
            <header class="header">
                <h1>API Key Manager</h1>
                <div class="header-actions">
                    <button
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        aria-label="Toggle theme"
                    >
                        <span class="theme-toggle-slider">
                            <i class="fa-solid fa-sun"></i>
                        </span>
                    </button>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <h2>
                        <i class="fa-solid fa-plus"></i>
                        Add New API Key
                    </h2>

                    <button class="btn btn-success" onclick="reloadConfig()">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
                <div class="card-body">
                    <div class="add-key-form">
                        <div class="form-group">
                            <label for="newKeyName">Key Name</label>
                            <input
                                type="text"
                                id="newKeyName"
                                placeholder="e.g., Production Key"
                            />
                        </div>
                        <div class="form-group">
                            <label for="newApiKey">API Key</label>
                            <input
                                type="text"
                                id="newApiKey"
                                placeholder="Leave empty to generate"
                            />
                        </div>
                        <button class="btn btn-success" onclick="generateKey()">
                            <i class="fa-solid fa-arrow-rotate-right"></i>
                            Generate
                        </button>
                        <button class="btn btn-primary" onclick="addKey()">
                            <i class="fa-solid fa-plus"></i>
                            Add Key
                        </button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>
                        <i class="fa-solid fa-key"></i>
                        Existing API Keys
                    </h2>
                    <span class="badge" id="keyCountText">0 keys</span>
                </div>
                <div id="keysTableContainer" style="min-height: 100px">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <span>Loading keys...</span>
                    </div>
                </div>
            </div>
        </main>

        <script src="shared.js"></script>
        <script src="js/keys.js"></script>
    </body>
</html>
