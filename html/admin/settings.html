<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Admin Settings</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="shared.css" />
        <script src="theme.js"></script>
        <style>
            .card {
                background: var(--card-bg);
                border-radius: 16px;
                box-shadow: var(--card-shadow);
                overflow: hidden;
                margin-bottom: 24px;
            }

            .card-header {
                padding: 20px 24px;
                border-bottom: 1px solid var(--gray-200);
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .card-header i {
                font-size: 18px;
                color: var(--primary);
            }

            .card-header h2 {
                font-size: 17px;
                font-weight: 600;
                color: var(--gray-800);
            }

            .card-header .card-subtitle {
                font-size: 13px;
                color: var(--gray-500);
                margin-left: auto;
            }

            .card-body {
                padding: 24px;
                display: flex;
                flex-direction: column;
                gap: 24px;
            }

            .setting-row {
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 24px;
            }

            .setting-row + .setting-row {
                padding-top: 24px;
                border-top: 1px solid var(--gray-100);
            }

            .setting-info {
                flex: 1;
            }

            .setting-label {
                font-size: 15px;
                font-weight: 600;
                color: var(--gray-800);
                margin-bottom: 4px;
            }

            .setting-description {
                font-size: 13px;
                color: var(--gray-500);
                line-height: 1.5;
            }

            .setting-control {
                display: flex;
                align-items: center;
                flex-shrink: 0;
            }

            .toggle-wrapper {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .toggle {
                position: relative;
                width: 52px;
                height: 28px;
                cursor: pointer;
            }

            .toggle input {
                opacity: 0;
                width: 0;
                height: 0;
                position: absolute;
            }

            .toggle-track {
                position: absolute;
                inset: 0;
                background: var(--gray-300);
                border-radius: 999px;
                transition: background 0.25s ease;
            }

            .toggle input:checked + .toggle-track {
                background: var(--primary);
            }

            .toggle-thumb {
                position: absolute;
                top: 3px;
                left: 3px;
                width: 22px;
                height: 22px;
                background: var(--card-bg);
                border-radius: 50%;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
                transition: transform 0.25s ease;
            }

            .toggle input:checked ~ .toggle-thumb {
                transform: translateX(24px);
            }

            .toggle-status {
                font-size: 13px;
                font-weight: 500;
                color: var(--gray-500);
                min-width: 32px;
            }

            .toggle input:checked ~ .toggle-status,
            .toggle-status.enabled {
                color: var(--primary);
            }

            .number-input-wrapper {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .number-input {
                width: 80px;
                padding: 9px 12px;
                border: 2px solid var(--gray-200);
                border-radius: 10px;
                font-size: 14px;
                font-family: inherit;
                text-align: center;
                background: var(--gray-50);
                color: var(--gray-800);
                transition: all 0.2s ease;
            }

            .number-input:focus {
                outline: none;
                border-color: var(--primary);
                background: var(--card-bg);
                box-shadow: 0 0 0 3px var(--primary-alpha-01);
            }

            .number-input:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .btn {
                padding: 10px 20px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
                font-family: inherit;
                transition: all 0.2s ease;
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }

            .btn-primary {
                background: linear-gradient(
                    135deg,
                    var(--primary) 0%,
                    var(--primary-alt) 100%
                );
                color: white;
            }

            .btn-primary:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 12px var(--primary-alpha-035);
            }

            .btn-primary:disabled {
                opacity: 0.5;
                cursor: not-allowed;
                transform: none;
                box-shadow: none;
            }

            .toast {
                position: fixed;
                bottom: 24px;
                right: 24px;
                padding: 14px 20px;
                border-radius: 12px;
                color: white;
                font-weight: 500;
                font-size: 14px;
                display: flex;
                align-items: center;
                gap: 10px;
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.3s ease;
                z-index: 2000;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            }

            .toast.show {
                transform: translateY(0);
                opacity: 1;
            }

            .toast.success {
                background: var(--success);
            }
            .toast.error {
                background: var(--danger);
            }

            .loading-row {
                height: 48px;
                background: linear-gradient(
                    90deg,
                    var(--gray-100) 25%,
                    var(--gray-200) 50%,
                    var(--gray-100) 75%
                );
                background-size: 200% 100%;
                animation: shimmer 1.4s infinite;
                border-radius: 10px;
            }

            @keyframes shimmer {
                0% {
                    background-position: 200% 0;
                }
                100% {
                    background-position: -200% 0;
                }
            }

            @media (max-width: 768px) {
                .setting-row {
                    flex-direction: column;
                    gap: 12px;
                }
            }
        </style>
    </head>
    <body>
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-brands fa-square-web-awesome-stroke"></i>
                </div>
                <span class="logo-text">Admin Panel</span>
            </div>

            <nav class="nav-menu">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item" href="/admin/users">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item" href="/admin/keys">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item" href="/admin/logs">
                    <i class="fa-solid fa-terminal"></i>
                    <span>Logs</span>
                </a>
                <a class="nav-item active">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <div id="toast" class="toast">
            <i id="toastIcon" class="fa-solid fa-circle-check"></i>
            <span id="toastText"></span>
        </div>

        <main class="main-content">
            <header class="header">
                <h1>Settings</h1>
                <div class="header-actions">
                    <button
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        aria-label="Toggle theme"
                    >
                        <span class="theme-toggle-slider">
                            <i class="fa-solid fa-sun"></i>
                        </span>
                    </button>
                    <button
                        class="btn btn-primary"
                        id="saveBtn"
                        onclick="saveSettings()"
                    >
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save Changes
                    </button>
                </div>
            </header>

            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-bolt"></i>
                    <h2>Claude Prompt Caching</h2>
                    <span class="card-subtitle">Anthropic / OpenRouter</span>
                </div>
                <div class="card-body" id="settingsBody">
                    <div class="loading-row"></div>
                    <div class="loading-row" style="width: 60%"></div>
                </div>
            </div>
        </main>

        <script>
            // ── Auth helpers ────────────────────────────────────────────────
            async function logout() {
                await fetch("/admin/logout", { method: "POST" }).catch(
                    () => {},
                );
                window.location.href = "/admin/login";
            }

            // ── Toast ────────────────────────────────────────────────────────
            function showToast(message, type = "success") {
                const toast = document.getElementById("toast");
                const icon = document.getElementById("toastIcon");
                const text = document.getElementById("toastText");
                icon.className =
                    type === "success"
                        ? "fa-solid fa-circle-check"
                        : "fa-solid fa-circle-exclamation";
                text.textContent = message;
                toast.className = `toast show ${type}`;
                setTimeout(() => {
                    toast.className = "toast";
                }, 3500);
            }

            // ── In-memory settings snapshot ──────────────────────────────────
            let settings = {};

            // ── Render ───────────────────────────────────────────────────────
            function renderSettings(s) {
                settings = { ...s };

                const body = document.getElementById("settingsBody");
                body.innerHTML = `

                <div class="setting-row">
                    <div class="setting-info">
                        <div class="setting-label">Enable Prompt Caching</div>
                        <div class="setting-description">
                            When enabled, the proxy automatically injects
                            <code style="background:var(--gray-100);padding:1px 5px;border-radius:4px;font-size:12px;">cache_control</code>
                            breakpoints into Claude messages before forwarding them to the backend.
                            Caching can reduce costs and latency on long, repeated contexts.
                            <br><br>
                            Individual requests can still override this by including a
                            <code style="background:var(--gray-100);padding:1px 5px;border-radius:4px;font-size:12px;">cache_depth</code>
                            field in the request body
                            (<code style="background:var(--gray-100);padding:1px 5px;border-radius:4px;font-size:12px;">-1</code> = disable for that request).
                        </div>
                    </div>
                    <div class="setting-control">
                        <label class="toggle" title="Toggle prompt caching">
                            <input type="checkbox" id="cachingEnabled"
                                   ${s.promptCachingEnabled ? "checked" : ""}
                                   onchange="onCachingToggle()">
                            <div class="toggle-track"></div>
                            <div class="toggle-thumb"></div>
                        </label>
                    </div>
                </div>


                <div class="setting-row" id="depthRow" style="${s.promptCachingEnabled ? "" : "opacity:0.45;pointer-events:none;"}">
                    <div class="setting-info">
                        <div class="setting-label">Cache Depth</div>
                        <div class="setting-description">
                            Controls how many recent messages are <em>excluded</em> from caching.
                            <br>
                            <strong>0</strong> &mdash; cache all messages.
                            &nbsp;|&nbsp;
                            <strong>1</strong> &mdash; cache all except the last message (most recent user turn).
                            &nbsp;|&nbsp;
                            <strong>N</strong> &mdash; cache all except the last N messages.
                            <br><br>
                            Anthropic allows up to 4 cache breakpoints per request; the proxy
                            distributes them evenly across eligible messages.
                        </div>
                    </div>
                    <div class="setting-control">
                        <div class="number-input-wrapper">
                            <input type="number" class="number-input" id="cachingDepth"
                                   min="0" max="100" step="1"
                                   value="${s.promptCachingDepth}"
                                   ${s.promptCachingEnabled ? "" : "disabled"}>
                        </div>
                    </div>
                </div>
            `;
            }

            // ── Toggle handler ───────────────────────────────────────────────
            function onCachingToggle() {
                const enabled =
                    document.getElementById("cachingEnabled").checked;
                const depthRow = document.getElementById("depthRow");
                const depthInput = document.getElementById("cachingDepth");
                depthRow.style.opacity = enabled ? "1" : "0.45";
                depthRow.style.pointerEvents = enabled ? "auto" : "none";
                depthInput.disabled = !enabled;
            }

            // ── Load ─────────────────────────────────────────────────────────
            async function loadSettings() {
                try {
                    const res = await fetch("/api/settings");

                    if (res.status === 401 || res.status === 403) {
                        logout();
                        return;
                    }
                    if (!res.ok) throw new Error("Failed to load settings");

                    const data = await res.json();
                    renderSettings(data.settings);
                } catch (err) {
                    showToast(
                        "Error loading settings: " + err.message,
                        "error",
                    );
                }
            }

            // ── Save ─────────────────────────────────────────────────────────
            async function saveSettings() {
                const saveBtn = document.getElementById("saveBtn");
                const enabledEl = document.getElementById("cachingEnabled");
                const depthEl = document.getElementById("cachingDepth");

                if (!enabledEl || !depthEl) {
                    showToast("Settings not loaded yet", "error");
                    return;
                }

                const depth = parseInt(depthEl.value, 10);
                if (isNaN(depth) || depth < 0) {
                    showToast(
                        "Cache depth must be a non-negative integer",
                        "error",
                    );
                    return;
                }

                saveBtn.disabled = true;
                saveBtn.innerHTML =
                    '<i class="fa-solid fa-spinner fa-spin"></i> Saving…';

                try {
                    const res = await fetch("/api/settings", {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            promptCachingEnabled: enabledEl.checked,
                            promptCachingDepth: depth,
                        }),
                    });

                    if (res.status === 401 || res.status === 403) {
                        logout();
                        return;
                    }

                    const data = await res.json();
                    if (!res.ok)
                        throw new Error(
                            data.error || "Failed to save settings",
                        );

                    showToast("Settings saved successfully!", "success");
                    renderSettings(data.settings);
                } catch (err) {
                    showToast("Error saving settings: " + err.message, "error");
                } finally {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML =
                        '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
                }
            }

            // ── Init ─────────────────────────────────────────────────────────
            loadSettings();
        </script>
    </body>
</html>
