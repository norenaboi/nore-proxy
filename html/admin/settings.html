<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Admin Settings</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="shared.css" />
        <script src="theme.js"></script>
        <link rel="stylesheet" href="css/settings.css" />
        <link rel="stylesheet" href="css/admin-editorial.css" />
    </head>
    <body>
        <a class="skip-link" href="#main">Skip to content</a>
        <aside class="sidebar">
            <div class="logo">
                <img class="logo-icon" src="/favicon.ico" alt="">
                <span class="logo-text">Nore Proxy</span>
            </div>

            <nav class="nav-menu" aria-label="Admin navigation">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item" href="/admin/users">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item" href="/admin/keys">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item" href="/admin/console">
                    <i class="fa-solid fa-terminal"></i>
                    <span>Console</span>
                </a>
                <a class="nav-item" href="/admin/logs">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                    <span>Logs</span>
                </a>
                <a class="nav-item" href="/admin/errors">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Errors</span>
                </a>
                <a class="nav-item active" aria-current="page">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <div id="toast" class="toast">
            <i id="toastIcon" class="fa-solid fa-circle-check"></i>
            <span id="toastText"></span>
        </div>

        <main class="main-content" id="main">
            <header class="header">
                <h1>Settings</h1>
                <div class="header-actions">
                    <button
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        aria-label="Toggle theme"
                    >
                        <span class="theme-toggle-slider">
                            <i class="fa-solid fa-sun"></i>
                        </span>
                    </button>
                    <button
                        class="btn btn-primary"
                        id="saveBtn"
                        onclick="saveSettings()"
                    >
                        <i class="fa-solid fa-floppy-disk"></i>
                        Save Changes
                    </button>
                </div>
            </header>

            <!-- Key Defaults -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-key"></i>
                    <h2>Keys</h2>
                    <span class="card-subtitle">Default per-key limits</span>
                </div>
                <div class="card-body" id="keyDefaultsBody">
                    <div class="loading-row"></div>
                    <div class="loading-row" style="width: 60%"></div>
                </div>
            </div>

            <!-- Key Failover -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-shuffle"></i>
                    <h2>Key Failover</h2>
                    <span class="card-subtitle">Automatic key hopping</span>
                </div>
                <div class="card-body" id="keyFailoverBody">
                    <div class="loading-row"></div>
                    <div class="loading-row" style="width: 60%"></div>
                </div>
            </div>

            <!-- Endpoint Defaults -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <h2>Endpoint</h2>
                    <span class="card-subtitle">New endpoints only</span>
                </div>
                <div class="card-body" id="endpointDefaultsBody">
                    <div class="loading-row"></div>
                    <div class="loading-row" style="width: 60%"></div>
                </div>
            </div>
        </main>

        <script src="shared.js"></script>
        <script src="js/settings.js"></script>
    </body>
</html>
