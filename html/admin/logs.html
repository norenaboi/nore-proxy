<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Live Logs</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="shared.css" />
        <script src="theme.js"></script>
        <link rel="stylesheet" href="css/logs.css" />
        <link rel="stylesheet" href="css/admin-editorial.css" />
    </head>

    <body>
        <a class="skip-link" href="#main">Skip to content</a>
        <aside class="sidebar">
            <div class="logo">
                <img class="logo-icon" src="/favicon.ico" alt="">
                <span class="logo-text">Nore Proxy</span>
            </div>

            <nav class="nav-menu" aria-label="Admin navigation">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item" href="/admin/users">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item" href="/admin/keys">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item active" aria-current="page">
                    <i class="fa-solid fa-terminal"></i>
                    <span>Logs</span>
                </a>
                <a class="nav-item" href="/admin/errors">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Errors</span>
                </a>
                <a class="nav-item" href="/admin/settings">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <main class="main-content" id="main">
            <header class="header">
                <h1>Live Terminal Logs</h1>

                <div class="header-actions">
                    <button
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        aria-label="Toggle theme"
                    >
                        <span class="theme-toggle-slider">
                            <i class="fa-solid fa-sun"></i>
                        </span>
                    </button>
                </div>
            </header>

            <div class="controls-section">
                <div class="controls">
                    <div class="status">
                        <div id="statusDot" class="status-dot"></div>
                        <span id="statusText">Disconnected</span>
                    </div>

                    <button class="btn btn-danger" onclick="clearLogs()">
                        <i class="fa-solid fa-trash"></i>
                        Clear Logs
                    </button>
                </div>
            </div>


            <div class="logs-container">
                <div class="logs-header">
                    <span>
                        <i class="fa-solid fa-terminal"></i>
                        Real-time Server Output
                    </span>
                </div>

                <div id="logsTerminal" class="logs-terminal"></div>
            </div>
        </main>

        <script src="shared.js"></script>
        <script src="js/logs.js"></script>
    </body>
</html>
