<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Live Logs</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="shared.css" />
        <script src="theme.js"></script>
        <style>
            .controls {
                display: flex;
                gap: 12px;
                align-items: center;
            }

            .status {
                display: flex;
                align-items: center;
                gap: 8px;
                background: var(--card-bg);
                padding: 10px 14px;
                border-radius: 10px;
                color: var(--text-primary);
                font-size: 0.9rem;
            }

            .status-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--danger);
            }

            .status-dot.connected {
                background: var(--success);
                box-shadow: 0 0 10px var(--success-alpha-06);
            }

            .btn {
                border: none;
                padding: 10px 16px;
                border-radius: 10px;
                cursor: pointer;
                font-weight: 600;
            }

            .btn-danger {
                background: var(--danger);
                color: white;
            }

            .logs-container {
                background: var(--gray-900);
                border-radius: 16px;
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .logs-header {
                background: var(--gray-800);
                padding: 16px 20px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .logs-terminal {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                font-family: "SF Mono", Monaco, Consolas, monospace;
                font-size: 13px;
                line-height: 1.6;
            }

            .log-entry {
                display: flex;
                gap: 12px;
                margin-bottom: 8px;
                padding: 8px 12px;
                border-radius: 8px;
                animation: fadeIn 0.2s ease;
                word-break: break-word;
            }

            .log-entry:hover {
                background: rgba(255, 255, 255, 0.04);
            }

            .log-time {
                color: #64748b;
                white-space: nowrap;
            }

            .log-level {
                min-width: 60px;
                font-weight: 700;
                text-transform: uppercase;
            }

            .log-level.info {
                color: #60a5fa;
            }

            .log-level.warn {
                color: var(--warning);
            }

            .log-level.error {
                color: var(--danger);
            }

            .log-message {
                flex: 1;
                color: var(--gray-50);
                white-space: pre-wrap;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(4px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>

    <body>
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-brands fa-square-web-awesome-stroke"></i>
                </div>
                <span class="logo-text">Admin Panel</span>
            </div>

            <nav class="nav-menu">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item" href="/admin/users">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item" href="/admin/keys">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item active">
                    <i class="fa-solid fa-terminal"></i>
                    <span>Logs</span>
                </a>
                <a class="nav-item" href="/admin/settings">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>Live Terminal Logs</h1>

                <div class="header-actions">
                    <button
                        class="theme-toggle"
                        onclick="toggleTheme()"
                        aria-label="Toggle theme"
                    >
                        <span class="theme-toggle-slider">
                            <i class="fa-solid fa-sun"></i>
                        </span>
                    </button>
                </div>
            </header>

            <div class="controls-section">
                <div class="controls">
                    <div class="status">
                        <div id="statusDot" class="status-dot"></div>
                        <span id="statusText">Disconnected</span>
                    </div>

                    <button class="btn btn-danger" onclick="clearLogs()">
                        <i class="fa-solid fa-trash"></i>
                        Clear Logs
                    </button>
                </div>
            </div>

            <style>
                .controls-section {
                    margin-bottom: 24px;
                }
            </style>

            <div class="logs-container">
                <div class="logs-header">
                    <span>
                        <i class="fa-solid fa-terminal"></i>
                        Real-time Server Output
                    </span>
                </div>

                <div id="logsTerminal" class="logs-terminal"></div>
            </div>
        </main>

        <script>
            const terminal = document.getElementById("logsTerminal");
            const statusDot = document.getElementById("statusDot");
            const statusText = document.getElementById("statusText");

            function addLog(log) {
                const entry = document.createElement("div");
                entry.className = "log-entry";

                const time = new Date(log.timestamp).toLocaleTimeString();

                entry.innerHTML = `
                    <span class="log-time">${time}</span>
                    <span class="log-level ${log.level}">${log.level}</span>
                    <span class="log-message"></span>
                `;

                entry.querySelector(".log-message").textContent = log.message;

                terminal.appendChild(entry);
                terminal.scrollTop = terminal.scrollHeight;

                while (terminal.children.length > 500) {
                    terminal.removeChild(terminal.firstChild);
                }
            }

            function connectSSE() {
                const eventSource = new EventSource("/api/logs/stream");

                eventSource.onopen = () => {
                    statusDot.classList.add("connected");
                    statusText.textContent = "Connected";
                };

                eventSource.onerror = () => {
                    statusDot.classList.remove("connected");
                    statusText.textContent = "Disconnected";
                };

                eventSource.onmessage = (event) => {
                    const data = JSON.parse(event.data);

                    if (data.type === "initial") {
                        terminal.innerHTML = "";
                        data.logs.forEach(addLog);
                    }

                    if (data.type === "log") {
                        addLog(data.log);
                    }
                };
            }

            async function clearLogs() {
                const response = await fetch("/api/logs/clear", {
                    method: "POST",
                });

                if (response.ok) {
                    terminal.innerHTML = "";
                }
            }

            async function logout() {
                await fetch("/admin/logout", {
                    method: "POST",
                });

                window.location.href = "/admin/login";
            }

            connectSSE();
        </script>
    </body>
</html>
