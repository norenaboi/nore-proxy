<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Users - Admin Panel</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="shared.css" />
        <script src="theme.js"></script>
        <link rel="stylesheet" href="css/users.css" />
    </head>
    <body>
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-brands fa-square-web-awesome-stroke"></i>
                </div>
                <span class="logo-text">Admin Panel</span>
            </div>

            <nav class="nav-menu">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item active">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item" href="/admin/keys">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item" href="/admin/logs">
                    <i class="fa-solid fa-terminal"></i>
                    <span>Logs</span>
                </a>
                <a class="nav-item" href="/admin/errors">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span>Errors</span>
                </a>
                <a class="nav-item" href="/admin/settings">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <main class="main-content">
            <div id="usersList">
                <header class="header">
                    <h1>Users</h1>
                    <div class="header-actions">
                        <button
                            class="theme-toggle"
                            onclick="toggleTheme()"
                            aria-label="Toggle theme"
                        >
                            <span class="theme-toggle-slider">
                                <i class="fa-solid fa-sun"></i>
                            </span>
                        </button>
                    </div>
                </header>

                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                </div>

                <div class="users-grid" id="usersGrid"></div>
            </div>

            <div id="userDetail" class="user-detail"></div>
        </main>

        <script src="shared.js"></script>
        <script src="js/users.js"></script>
    </body>
</html>
